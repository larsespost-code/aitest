<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HK Hovedstaden · AI-kompetenceprofil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --hk-blue: #009FE3;
  --hk-dark: #004052;
  --hk-mid: #649DB8;
  --hk-light: #DEEEEE;
  --hk-bg: #F7F4E4;
  --hk-warm: #D0CDBC;
  --r: 8px;
  --font: 'Manrope', system-ui, sans-serif;
}
html { min-height: 100%; background: var(--hk-bg); }
body { font-family: var(--font); color: var(--hk-dark); min-height: 100vh; background: var(--hk-bg); }

.site-header {
  background: var(--hk-dark);
  padding: .9rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.site-logo-wrap { display: flex; align-items: center; gap: 12px; }
.site-name { font-size: 14px; font-weight: 400; color: #fff; letter-spacing: .03em; }
.header-tag { font-size: 11px; color: var(--hk-mid); letter-spacing: .06em; text-transform: uppercase; }

.page { max-width: 660px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

.prog-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: .6rem; }
.step-label { font-size: 12px; color: var(--hk-dark); font-weight: 500; opacity: .7; }
.prog-track { height: 3px; background: var(--hk-warm); border-radius: 2px; margin-bottom: 2rem; overflow: hidden; }
.prog-fill { height: 100%; background: var(--hk-blue); border-radius: 2px; transition: width .45s cubic-bezier(.4,0,.2,1); }

.card { background: #fff; border: 1px solid var(--hk-warm); border-radius: var(--r); padding: 1.75rem; margin-bottom: 1rem; }
.intro-box { background: var(--hk-dark); border-radius: var(--r); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
.intro-box p { font-size: 14px; color: #e8f3f7; line-height: 1.7; }

.domain-tag { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: .85rem; background: var(--hk-light); color: var(--hk-dark); letter-spacing: .06em; text-transform: uppercase; }
.q-title { font-size: 18px; font-weight: 500; color: var(--hk-dark); line-height: 1.4; margin-bottom: 1.25rem; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
@media(max-width:480px){ .grid2 { grid-template-columns: 1fr; } }
.pick-btn {
  padding: .8rem 1rem; border: 1px solid var(--hk-warm); border-radius: var(--r);
  cursor: pointer; font-size: 14px; font-weight: 500; color: var(--hk-dark);
  text-align: center; background: #fff; transition: all .15s; width: 100%;
  font-family: var(--font);
}
.pick-btn:hover { border-color: var(--hk-mid); background: var(--hk-light); }
.pick-btn.selected { border-color: var(--hk-blue); background: var(--hk-light); color: var(--hk-dark); }

.opts { display: flex; flex-direction: column; gap: .5rem; }
.opt {
  display: grid; grid-template-columns: 104px 1fr; gap: .85rem; align-items: start;
  padding: .9rem 1rem; border: 1px solid var(--hk-warm); border-radius: var(--r);
  cursor: pointer; transition: all .15s; background: #fff;
}
@media(max-width:500px){ .opt { grid-template-columns: 1fr; } }
.opt:hover { border-color: var(--hk-mid); background: var(--hk-light); }
.opt.selected { border-color: var(--hk-blue); background: var(--hk-light); }
.opt.not-yet { background: #fafaf8; }
.opt.not-yet:hover { background: var(--hk-light); border-color: var(--hk-mid); }
.opt.not-yet.selected { border-color: var(--hk-mid); background: var(--hk-light); }
.opt-indicator { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; padding-top: 2px; }
.level-pill {
  display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 8px;
  border-radius: 20px; white-space: nowrap; background: var(--hk-bg); color: var(--hk-dark);
}
.opt.selected .level-pill { background: var(--hk-blue); color: #fff; }
.opt.not-yet.selected .level-pill { background: var(--hk-mid); color: #fff; }
.ldots { display: flex; gap: 3px; margin-top: 2px; }
.ldot { width: 6px; height: 6px; border-radius: 50%; background: var(--hk-bg); }
.opt.selected .ldot.on { background: var(--hk-blue); }
.opt-text { font-size: 14px; color: var(--hk-dark); line-height: 1.6; padding-top: 2px; }
.not-yet .opt-text { color: var(--hk-mid); }

.nav { display: flex; justify-content: space-between; align-items: center; margin-top: .5rem; }
.btn {
  padding: .65rem 1.5rem; border-radius: var(--r); font-size: 14px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--hk-warm); background: transparent;
  color: var(--hk-dark); transition: all .15s; font-family: var(--font);
}
.btn:hover { background: var(--hk-light); border-color: var(--hk-mid); }
.btn.primary { background: var(--hk-blue); color: #fff; border-color: var(--hk-blue); }
.btn.primary:hover { background: #008cca; border-color: #008cca; }
.btn:disabled { opacity: .3; cursor: default; pointer-events: none; }
.btn.pdf-btn { background: var(--hk-dark); color: #fff; border-color: var(--hk-dark); }
.btn.pdf-btn:hover { background: #002e3a; }

.sending-state { text-align: center; padding: 3rem 1.5rem; }
.sending-icon {
  width: 44px; height: 44px; border: 3px solid var(--hk-light);
  border-top-color: var(--hk-blue); border-radius: 50%;
  animation: spin .8s linear infinite; margin: 0 auto 1.25rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.sending-state p { font-size: 15px; color: var(--hk-mid); }

.result-top {
  text-align: center; padding: 2rem 1.75rem;
  background: var(--hk-dark); border-radius: var(--r);
  margin-bottom: 1rem; color: #fff;
}
.arch-chip {
  display: inline-block; font-size: 12px; font-weight: 700;
  padding: 4px 14px; border-radius: 20px;
  background: var(--hk-blue); color: #fff; margin-bottom: .85rem; letter-spacing: .03em;
}
.result-name { font-size: 21px; font-weight: 500; color: #fff; margin-bottom: .85rem; }
.result-desc { font-size: 14px; color: var(--hk-light); line-height: 1.65; max-width: 440px; margin: 0 auto; }
.sent-badge {
  display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
  color: var(--hk-mid); background: #fff; border: 1px solid var(--hk-warm);
  padding: 3px 10px; border-radius: 20px; margin-bottom: 1rem;
}
.sent-dot { width: 7px; height: 7px; border-radius: 50%; background: #6abf8a; flex-shrink: 0; }
.chart-wrap { position: relative; width: 100%; height: 320px; margin: .5rem 0 1.25rem; }
.scores-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
@media(max-width:480px){ .scores-grid { grid-template-columns: 1fr; } }
.score-item {
  padding: .7rem 1rem; border: 1px solid var(--hk-warm);
  border-radius: var(--r); background: #fff;
  display: flex; justify-content: space-between; align-items: center; gap: .5rem;
}
.score-name { font-size: 12px; color: var(--hk-mid); margin-bottom: 4px; }
.rdots { display: flex; gap: 3px; }
.rdot { width: 9px; height: 9px; border-radius: 50%; background: var(--hk-bg); }
.rdot.filled { background: var(--hk-blue); }
.score-val { font-size: 12px; font-weight: 700; color: var(--hk-dark); text-align: right; min-width: 72px; }
.pdf-row { text-align: center; margin-top: 1.25rem; }
.personal-box { background: #fff; border: 1px solid var(--hk-warm); border-left: 4px solid var(--hk-blue); border-radius: var(--r); padding: 1rem 1.25rem; margin-bottom: 1rem; }
.personal-strength { font-size: 15px; color: var(--hk-dark); line-height: 1.6; margin-bottom: .4rem; }
.personal-develop { font-size: 14px; color: var(--hk-mid); line-height: 1.6; margin-top: .5rem; padding-top: .5rem; border-top: 1px solid var(--hk-warm); }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-logo-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 96.4" style="height:28px;width:auto">
      <polygon points="56.7 0 56.7 36.9 28.3 36.9 28.3 0 0 0 0 96.4 28.3 96.4 28.3 56.7 56.7 56.7 56.7 96.4 85 96.4 85 0 56.7 0" fill="#009de0"/>
      <polygon points="85 96.4 113.4 96.4 113.4 0 85 0 85 96.4" fill="#ffffff"/>
      <polygon points="141.7 0 113.4 48.2 141.7 96.4 170.1 96.4 141.7 48.2 170.1 0 141.7 0" fill="#ffffff"/>
    </svg>
    <div class="site-name">HK Hovedstaden</div>
  </div>
  <div class="header-tag">AI-kompetenceprofil</div>
</header>

<div class="page">
  <div class="prog-row">
    <div class="step-label" id="stepLabel">Min AI-kompetenceprofil</div>
  </div>
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div id="app"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxBfK3lgpN2yjHuDvgg07_b1Sq96cg42IkRsGMvAHEaoznp3qymX0nt24wOcLTTz3B58g/exec";

const ROLLER = [
  "Faglig konsulent",
  "Organisering / fastholdelse",
  "Administrativ medarbejder",
  "Drifts- eller sekretariatsmedarbejder",
  "Kommunikationsmedarbejder",
  "Leder",
  "Andet"
];

const QS = [
  {domain:"AI i praksis", title:"Praktisk brug af AI i arbejdet",
   notYet:"Jeg bruger ikke AI i mit arbejde.",
   opts:[
    "Jeg har prøvet AI til enkelte arbejdsopgaver.",
    "Jeg bruger AI jævnligt til relevante arbejdsopgaver.",
    "Jeg bruger AI systematisk og har fundet arbejdsopgaver, hvor det skaber tydelig værdi."
  ]},
  {domain:"AI i praksis", title:"At formulere gode opgaver til AI",
   notYet:"Jeg er usikker på, hvordan jeg skal bede AI om hjælp.",
   opts:[
    "Jeg kan skrive simple prompts.",
    "Jeg kan formulere præcise prompts og forbedre dem undervejs.",
    "Jeg bruger avancerede teknikker og vil kunne hjælpe andre med at få bedre resultater."
  ]},
  {domain:"AI forståelse", title:"Kvalitetssikring af AI-svar",
   notYet:"Jeg har svært ved at vurdere kvaliteten af AI's svar.",
   opts:[
    "Jeg ved, at AI kan tage fejl.",
    "Jeg kan identificere fejl, mangler og usikkerheder.",
    "Jeg kvalitetssikrer systematisk AI-output og tilpasser brugen efter opgavens risici."
  ]},
  {domain:"AI i praksis", title:"AI til faglig sparring og udvikling",
   notYet:"Jeg bruger ikke AI som sparringspartner.",
   opts:[
    "Jeg har prøvet at bruge AI til idéer eller læring.",
    "Jeg bruger AI jævnligt som modspil til idéer, analyse og faglig refleksion.",
    "AI er en fast, integreret sparringspartner, der udfordrer min faglighed og løfter kvaliteten af mit arbejde."
  ]},
  {domain:"AI ansvar", title:"Ansvarlig og sikker brug af AI",
   notYet:"Jeg er usikker på regler og retningslinjer.",
   opts:[
    "Jeg kender de vigtigste regler for datasikkerhed og fortrolighed.",
    "Jeg kan vurdere, hvornår og hvordan AI kan bruges forsvarligt.",
    "Jeg navigerer sikkert i komplekse dilemmaer om AI og fortrolighed, og min brug følger altid organisationens retningslinjer."
  ]},
  {domain:"AI forståelse", title:"Identifikation af muligheder i eget arbejde",
   notYet:"Jeg har indtil videre svært ved at se, hvor AI kan hjælpe.",
   opts:[
    "Jeg kan få øje på enkelte anvendelsesmuligheder.",
    "Jeg ser jævnligt oplagte muligheder for at bruge AI i mine opgaver.",
    "AI er en fuldt integreret del af mit arbejde, og jeg tænker automatisk AI-muligheder ind i nye opgaver."
  ]},
  {domain:"AI fællesskab", title:"Deling og læring med kolleger",
   notYet:"Jeg taler sjældent eller aldrig med kolleger om AI.",
   opts:[
    "Jeg fortæller af og til om gode erfaringer eller udfordringer.",
    "Jeg udveksler aktivt erfaringer og lærer af andre.",
    "Jeg bidrager til fælles læring og hjælper kolleger med at udvikle deres AI-brug."
  ]},
  {domain:"AI specialisering", title:"Bredde og specialisering i AI-værktøjer",
   notYet:"Jeg bruger ikke specialiserede AI-værktøjer (dvs. andre værktøjer end standard-chatbots som f.eks. ChatGPT eller Google Gemini).",
   opts:[
    "Jeg har hørt om eller afprøvet mere specialiserede AI-værktøjer (f.eks. til billeder, lyd, data eller præsentationer).",
    "Jeg udvælger bevidst forskellige AI-værktøjer baseret på opgaven (f.eks. NotebookLM til research, Napkin til visualisering eller lignende nicheværktøjer).",
    "Jeg designer mine egne løsninger ved at bygge specifikke GPT'er/Gembots til mine faste opgaver, eller jeg eksperimenterer systematisk med helt nye AI-teknologier."
  ]}
];

const LEVELS = ["Ikke endnu","Kender","Forstår","Behersker"];
const NOT_YET = "Jeg har ingen eller lidt erfaring med dette";

const ARCHETYPES = {
  generalist: {
    label: "Digital generalist",
    desc: "Du bruger AI som et praktisk redskab i hverdagen. Du er på vej til at forstå teknologien godt nok til at anvende den ansvarligt og effektivt."
  },
  integrator: {
    label: "Digital integrator",
    desc: "Du bygger bro mellem teknologi og kolleger. Du er god til at spotte muligheder, dele viden og sikre at AI bruges ansvarligt i fællesskabet."
  },
  specialist: {
    label: "Digital specialist",
    desc: "Du går i dybden med AI-værktøjer og avancerede teknikker. Du eksperimenterer systematisk og kan løfte andre med dig."
  }
};

const Q_NAMES = [
  "praktisk AI-brug",
  "prompt-formulering",
  "kvalitetssikring af AI-svar",
  "faglig sparring med AI",
  "ansvarlig AI-brug",
  "at identificere muligheder for AI",
  "videndeling med kolleger",
  "brug af specialiserede AI-værktøjer"
];

let step = 0, rolle = null, answers = new Array(8).fill(null), radarChart = null;
const TOTAL = 9;

function getArchetype() {
  const s = answers.map(a => a === null ? 0 : a);
  const avg = s.reduce((a,b) => a+b, 0) / 8;
  // Specialist: goes deep on tools (Q8) and advanced prompting (Q2)
  if (s[7] >= 2 && s[1] >= 2 && avg >= 1.5) return "specialist";
  // Integrator: bridges colleagues (Q7) and spots opportunities (Q6), responsible (Q5)
  if (s[6] >= 2 && s[5] >= 2 && avg >= 1.5) return "integrator";
  // Generalist: practical everyday user
  return "generalist";
}

function getPersonalText(scores) {
  const indexed = scores.map((s,i) => ({s, i})).sort((a,b) => b.s - a.s);
  const top = indexed.filter(x => x.s >= 2).slice(0, 2);
  const bottom = indexed.filter(x => x.s <= 1).slice(-1);

  let strength = '';
  if (top.length >= 2) {
    strength = `Du er særlig stærk på <strong>${Q_NAMES[top[0].i]}</strong> og <strong>${Q_NAMES[top[1].i]}</strong>.`;
  } else if (top.length === 1) {
    strength = `Du er særlig stærk på <strong>${Q_NAMES[top[0].i]}</strong>.`;
  } else {
    strength = 'Du er på vej i gang med AI — det er et godt udgangspunkt.';
  }

  let develop = '';
  if (bottom.length >= 1 && bottom[0].s < 2) {
    develop = `Et naturligt næste skridt er at arbejde mere med <strong>${Q_NAMES[bottom[0].i]}</strong>.`;
  }

  return { strength, develop };
}

function setProgress() {
  document.getElementById('progFill').style.width = Math.round((step / TOTAL) * 100) + '%';
  document.getElementById('stepLabel').textContent =
    step === 0 ? 'Min AI-kompetenceprofil' :
    step <= 8 ? `Spørgsmål ${step} af 8` : 'Din profil';
}

function dots(val) {
  return [1,2,3].map(d => `<div class="ldot${val >= d ? ' on' : ''}"></div>`).join('');
}

function renderRolle() {
  document.getElementById('app').innerHTML = `
    <div class="intro-box">
      <p>Vi vil bede dig svare på 8 spørgsmål om dit forhold til AI (kunstig intelligens). Din besvarelse er 100% anonym.<br><br>
      Målet er at få kortlagt, hvordan vi samlet står ift. AI-kendskab og -kundskaber i HK Hovedstaden.<br><br>
      Sidst i surveyen får du et overblik over din kompetenceprofil, som den ser ud lige nu. Det er kun dig, der får den, og den forsvinder, når du lukker ned for surveyen. Klik på "Gem som pdf"-knappen, hvis du vil gemme den og have mulighed for at følge din udvikling.</p>
    </div>
    <div class="card">
      <div class="q-title">Hvad er din primære funktion i HK Hovedstaden?</div>
      <div class="grid2">
        ${ROLLER.map(r => `<button class="pick-btn rol-btn${rolle===r?' selected':''}" onclick="pickRol(this,'${r.replace(/'/g,"&#39;")}')">${r}</button>`).join('')}
      </div>
    </div>
    <div class="nav"><span></span><button class="btn primary" id="rolNext" onclick="nextStep()" ${rolle?'':'disabled'}>Næste →</button></div>`;
}

function pickRol(el, val) {
  rolle = val;
  document.querySelectorAll('.rol-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('rolNext').disabled = false;
}

function renderQ(qi) {
  const q = QS[qi]; const ans = answers[qi];
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="domain-tag">${q.domain}</div>
      <div class="q-title">${q.title}</div>
      <div class="opts">
        <div class="opt not-yet${ans===0?' selected':''}" onclick="pickAns(${qi},0,this)">
          <div class="opt-indicator">
            <div class="level-pill">Ikke endnu</div>
            <div class="ldots">${dots(0)}</div>
          </div>
          <div class="opt-text">${q.notYet}</div>
        </div>
        ${q.opts.map((o,i) => `
        <div class="opt${ans===i+1?' selected':''}" onclick="pickAns(${qi},${i+1},this)">
          <div class="opt-indicator">
            <div class="level-pill">${LEVELS[i+1]}</div>
            <div class="ldots">${dots(i+1)}</div>
          </div>
          <div class="opt-text">${o}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="nav">
      <button class="btn" onclick="prevStep()">← Tilbage</button>
      <button class="btn primary" id="qNext" onclick="nextStep()" ${ans!==null?'':'disabled'}>
        ${qi < 7 ? 'Næste →' : 'Se min profil →'}
      </button>
    </div>`;
}

function pickAns(qi, val, el) {
  answers[qi] = val;
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('qNext').disabled = false;
}

async function submitAndShow() {
  const archKey = getArchetype();
  const payload = {
    funktion: rolle || '',
    arketype: archKey,
    svar: answers.map(a => a === null ? 0 : a),
    timestamp: new Date().toISOString()
  };

  document.getElementById('app').innerHTML = `
    <div class="card sending-state">
      <div class="sending-icon"></div>
      <p>Sender dine svar anonymt&hellip;</p>
    </div>`;

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch(e) {}

  setTimeout(() => renderResult(archKey, payload.svar), 700);
}

function renderResult(archKey, scores) {
  const arch = ARCHETYPES[archKey];
  const { strength, develop } = getPersonalText(scores);
  document.getElementById('app').innerHTML = `
    <div id="result-content">
      <div class="result-top">
        <div class="arch-chip">${arch.label}</div>
        <div class="result-name">${rolle || ''}</div>
        <div class="result-desc">${arch.desc}</div>
      </div>
      <div class="personal-box">
        <div class="personal-strength">${strength}</div>
        ${develop ? `<div class="personal-develop">${develop}</div>` : ''}
      </div>
      <div class="card">
        <div style="text-align:center;margin-bottom:.75rem">
          <div class="sent-badge"><div class="sent-dot"></div>Svar registreret anonymt</div>
        </div>
        <div class="chart-wrap">
          <canvas id="radarChart"></canvas>
        </div>
        <div class="scores-grid">
          ${QS.map((q,i) => `
          <div class="score-item">
            <div>
              <div class="score-name">${q.title}</div>
              <div class="rdots">${[1,2,3].map(d=>`<div class="rdot${scores[i]>=d?' filled':''}"></div>`).join('')}</div>
            </div>
            <div class="score-val">${LEVELS[scores[i]]}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>
    <div class="pdf-row">
      <button class="btn pdf-btn" onclick="downloadPDF()">Gem resultat som PDF</button>
    </div>`;

  setTimeout(() => {
    const ctx = document.getElementById('radarChart');
    if (!ctx) return;
    if (radarChart) { radarChart.destroy(); radarChart = null; }
    radarChart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: QS.map(q => q.title),
        datasets: [{
          label: 'Din profil',
          data: scores,
          backgroundColor: 'rgba(0,159,227,0.12)',
          borderColor: '#009FE3',
          borderWidth: 2,
          pointBackgroundColor: '#004052',
          pointBorderColor: '#009FE3',
          pointRadius: 5
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { r: {
          min: 0, max: 3,
          ticks: { stepSize: 1, display: false },
          pointLabels: { font: { size: 10, family: "'Manrope', sans-serif" }, color: '#649DB8' },
          grid: { color: 'rgba(0,64,82,0.08)' },
          angleLines: { color: 'rgba(0,64,82,0.08)' }
        }}
      }
    });
  }, 100);
}

async function downloadPDF() {
  const btn = document.querySelector('.pdf-btn');
  btn.textContent = 'Genererer PDF…';
  btn.disabled = true;

  try {
    const el = document.getElementById('result-content');
    const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#D0CDBC', useCORS: true });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 15;
    const imgW = pageW - margin * 2;
    const imgH = (canvas.height * imgW) / canvas.width;
    const yPos = imgH < pageH - margin * 2 ? (pageH - imgH) / 2 : margin;
    pdf.addImage(imgData, 'PNG', margin, yPos, imgW, Math.min(imgH, pageH - margin * 2));
    pdf.save('HK_AI_Kompetenceprofil.pdf');
  } catch(e) {
    alert('PDF-generering fejlede. Prøv at tage et screenshot i stedet.');
  }

  btn.textContent = 'Gem resultat som PDF';
  btn.disabled = false;
}

function nextStep() {
  step++;
  if (step === 0) renderRolle();
  else if (step >= 1 && step <= 8) renderQ(step - 1);
  else submitAndShow();
  setProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevStep() {
  step--;
  if (step === 0) renderRolle();
  else renderQ(step - 1);
  setProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderRolle();
setProgress();
</script>
