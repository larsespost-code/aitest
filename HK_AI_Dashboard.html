<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HK Hovedstaden · AI-kortlægning — Live</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --hk-blue: #009FE3;
  --hk-dark: #004052;
  --hk-mid: #649DB8;
  --hk-light: #DEEEEE;
  --hk-cream: #F7F4E4;
  --hk-warm: #D0CDBC;
  --font: 'Manrope', system-ui, sans-serif;
}
html, body { height: 100%; background: var(--hk-dark); color: #fff; font-family: var(--font); }

/* Header */
.header {
  background: rgba(0,0,0,0.2);
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.logo-wrap { display: flex; align-items: center; gap: 12px; }
.org-name { font-size: 15px; font-weight: 400; color: #fff; opacity: .85; }
.header-title { font-size: 13px; color: var(--hk-mid); letter-spacing: .06em; text-transform: uppercase; }

/* Main */
.main { padding: 2rem; max-width: 1200px; margin: 0 auto; }

/* Fetch bar */
.fetch-bar {
  display: flex; align-items: center; gap: 1rem;
  margin-bottom: 2rem;
}
.fetch-btn {
  padding: .7rem 1.75rem; background: var(--hk-blue); color: #fff;
  border: none; border-radius: 8px; font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: var(--font); transition: background .15s;
  display: flex; align-items: center; gap: 8px;
}
.fetch-btn:hover { background: #008cca; }
.fetch-btn:disabled { opacity: .5; cursor: default; }
.fetch-status { font-size: 13px; color: var(--hk-mid); }
.spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty state */
.empty { text-align: center; padding: 4rem 2rem; color: var(--hk-mid); font-size: 16px; }

/* Stats row */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem;
  margin-bottom: 2rem;
}
.stat-card {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 1.25rem 1.5rem;
  opacity: 0; transform: translateY(12px);
  transition: opacity .4s ease, transform .4s ease;
}
.stat-card.show { opacity: 1; transform: translateY(0); }
.stat-label { font-size: 12px; color: var(--hk-mid); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .4rem; }
.stat-value { font-size: 32px; font-weight: 700; color: #fff; line-height: 1; }
.stat-sub { font-size: 12px; color: var(--hk-mid); margin-top: .3rem; }

/* Archetype pills */
.arch-pills { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .6rem; }
.arch-pill {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 500; padding: 3px 10px;
  border-radius: 20px; white-space: nowrap;
}
.arch-pill.generalist { background: rgba(100,157,184,0.25); color: var(--hk-light); }
.arch-pill.integrator { background: rgba(0,159,227,0.25); color: #7dd4f8; }
.arch-pill.specialist { background: rgba(0,64,82,0.6); color: #fff; border: 1px solid var(--hk-mid); }
.arch-dot { width: 7px; height: 7px; border-radius: 50%; }
.arch-pill.generalist .arch-dot { background: var(--hk-mid); }
.arch-pill.integrator .arch-dot { background: var(--hk-blue); }
.arch-pill.specialist .arch-dot { background: #fff; }

/* Charts grid */
.charts-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
  margin-bottom: 2rem;
}
.chart-card {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 1.5rem;
  opacity: 0; transform: translateY(12px);
  transition: opacity .5s ease, transform .5s ease;
}
.chart-card.show { opacity: 1; transform: translateY(0); }
.chart-title { font-size: 13px; font-weight: 500; color: var(--hk-mid); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 1.25rem; }
.chart-wrap { position: relative; width: 100%; height: 280px; }

/* Bar chart */
.bar-list { display: flex; flex-direction: column; gap: .6rem; }
.bar-row { display: flex; align-items: center; gap: .75rem; }
.bar-label { font-size: 12px; color: var(--hk-light); width: 200px; flex-shrink: 0; line-height: 1.3; }
.bar-track { flex: 1; height: 10px; background: rgba(255,255,255,0.08); border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; background: var(--hk-blue); width: 0%; transition: width .8s cubic-bezier(.4,0,.2,1); }
.bar-score { font-size: 12px; font-weight: 700; color: var(--hk-blue); width: 40px; text-align: right; flex-shrink: 0; }

/* Highlight row */
.highlights {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
  opacity: 0; transform: translateY(12px);
  transition: opacity .6s ease, transform .6s ease;
}
.highlights.show { opacity: 1; transform: translateY(0); }
.highlight-card { border-radius: 10px; padding: 1.25rem 1.5rem; }
.highlight-card.top { background: rgba(0,159,227,0.15); border: 1px solid rgba(0,159,227,0.25); }
.highlight-card.bottom { background: rgba(100,157,184,0.1); border: 1px solid rgba(100,157,184,0.2); }
.highlight-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .5rem; }
.highlight-card.top .highlight-label { color: var(--hk-blue); }
.highlight-card.bottom .highlight-label { color: var(--hk-mid); }
.highlight-name { font-size: 17px; font-weight: 500; color: #fff; line-height: 1.3; }
.highlight-avg { font-size: 13px; color: var(--hk-mid); margin-top: .3rem; }
</style>
</head>
<body>

<header class="header">
  <div class="logo-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170.1 96.4" style="height:26px;width:auto">
      <polygon points="56.7 0 56.7 36.9 28.3 36.9 28.3 0 0 0 0 96.4 28.3 96.4 28.3 56.7 56.7 56.7 56.7 96.4 85 96.4 85 0 56.7 0" fill="#009de0"/>
      <polygon points="85 96.4 113.4 96.4 113.4 0 85 0 85 96.4" fill="#ffffff"/>
      <polygon points="141.7 0 113.4 48.2 141.7 96.4 170.1 96.4 141.7 48.2 170.1 0 141.7 0" fill="#ffffff"/>
    </svg>
    <div class="org-name">HK Hovedstaden</div>
  </div>
  <div class="header-title">AI-kortlægning — Live resultater</div>
</header>

<div class="main">
  <div class="fetch-bar">
    <button class="fetch-btn" id="fetchBtn" onclick="loadData()">
      <span id="fetchIcon">↻</span> Hent resultater
    </button>
    <div class="fetch-status" id="fetchStatus"></div>
  </div>
  <div id="dashboard"><div class="empty">Tryk "Hent resultater" for at indlæse data fra surveyen.</div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxBfK3lgpN2yjHuDvgg07_b1Sq96cg42IkRsGMvAHEaoznp3qymX0nt24wOcLTTz3B58g/exec";

const Q_LABELS = [
  "Praktisk brug af AI",
  "At formulere gode opgaver",
  "Kvalitetssikring af AI-svar",
  "AI til faglig sparring",
  "Ansvarlig og sikker brug",
  "Identifikation af muligheder",
  "Deling og læring med kolleger",
  "Bredde i AI-værktøjer"
];

const ARCH_LABELS = {
  generalist: "Generalist",
  integrator: "Integrator",
  specialist: "Specialist"
};

let radarChart = null;

async function loadData() {
  const btn = document.getElementById('fetchBtn');
  const icon = document.getElementById('fetchIcon');
  const status = document.getElementById('fetchStatus');

  btn.disabled = true;
  icon.outerHTML = '<span class="spin" id="fetchIcon"></span>';
  status.textContent = 'Henter data…';

  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();

    if (!data || data.length === 0) {
      status.textContent = 'Ingen svar endnu.';
      btn.disabled = false;
      document.getElementById('fetchIcon').outerHTML = '<span id="fetchIcon">↻</span>';
      return;
    }

    renderDashboard(data);
    status.textContent = `Sidst opdateret: ${new Date().toLocaleTimeString('da-DK')}`;
  } catch(e) {
    status.textContent = 'Fejl — tjek Apps Script deployment.';
  }

  btn.disabled = false;
  document.getElementById('fetchIcon').outerHTML = '<span id="fetchIcon">↻</span>';
}

function renderDashboard(data) {
  const n = data.length;

  // Archetype counts
  const archCounts = { generalist: 0, integrator: 0, specialist: 0 };
  data.forEach(r => {
    const k = (r.arketype || '').toLowerCase();
    if (archCounts[k] !== undefined) archCounts[k]++;
  });

  // Average scores per question
  const avgScores = Q_LABELS.map((_, qi) => {
    const vals = data.map(r => Number(r.svar[qi]) || 0);
    return vals.reduce((a,b) => a+b, 0) / vals.length;
  });

  // Sorted for bar chart
  const sorted = avgScores.map((avg, i) => ({ i, avg, label: Q_LABELS[i] }))
    .sort((a,b) => b.avg - a.avg);

  const topQ = sorted[0];
  const bottomQ = sorted[sorted.length - 1];

  // Build HTML
  const archPillsHtml = Object.entries(archCounts)
    .filter(([,c]) => c > 0)
    .map(([k,c]) => `<div class="arch-pill ${k}"><div class="arch-dot"></div>${c} ${ARCH_LABELS[k]}</div>`)
    .join('');

  document.getElementById('dashboard').innerHTML = `
    <div class="stats-row">
      <div class="stat-card" id="sc0">
        <div class="stat-label">Respondenter</div>
        <div class="stat-value">${n}</div>
        <div class="stat-sub">svar modtaget</div>
      </div>
      <div class="stat-card" id="sc1" style="grid-column: span 3">
        <div class="stat-label">Arketyper</div>
        <div class="arch-pills">${archPillsHtml}</div>
        <div class="stat-sub" style="margin-top:.75rem">
          ${pct(archCounts.generalist, n)}% generalist &nbsp;·&nbsp;
          ${pct(archCounts.integrator, n)}% integrator &nbsp;·&nbsp;
          ${pct(archCounts.specialist, n)}% specialist
        </div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card" id="cc0">
        <div class="chart-title">Gruppens gennemsnitsprofil</div>
        <div class="chart-wrap"><canvas id="radarChart"></canvas></div>
      </div>
      <div class="chart-card" id="cc1">
        <div class="chart-title">Score pr. kompetence (0–3)</div>
        <div class="bar-list" id="barList"></div>
      </div>
    </div>

    <div class="highlights" id="highlights">
      <div class="highlight-card top">
        <div class="highlight-label">↑ Stærkeste område</div>
        <div class="highlight-name">${topQ.label}</div>
        <div class="highlight-avg">Gennemsnit: ${topQ.avg.toFixed(2).replace('.',',')} ud af 3</div>
      </div>
      <div class="highlight-card bottom">
        <div class="highlight-label">→ Størst udviklingspotentiale</div>
        <div class="highlight-name">${bottomQ.label}</div>
        <div class="highlight-avg">Gennemsnit: ${bottomQ.avg.toFixed(2).replace('.',',')} ud af 3</div>
      </div>
    </div>`;

  // Animate in
  setTimeout(() => document.getElementById('sc0').classList.add('show'), 100);
  setTimeout(() => document.getElementById('sc1').classList.add('show'), 200);
  setTimeout(() => document.getElementById('cc0').classList.add('show'), 350);
  setTimeout(() => document.getElementById('cc1').classList.add('show'), 450);
  setTimeout(() => document.getElementById('highlights').classList.add('show'), 600);

  // Radar chart
  setTimeout(() => {
    const ctx = document.getElementById('radarChart');
    if (!ctx) return;
    if (radarChart) { radarChart.destroy(); radarChart = null; }
    radarChart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: Q_LABELS,
        datasets: [{
          label: 'Gruppe',
          data: avgScores,
          backgroundColor: 'rgba(0,159,227,0.15)',
          borderColor: '#009FE3',
          borderWidth: 2,
          pointBackgroundColor: '#fff',
          pointBorderColor: '#009FE3',
          pointRadius: 5
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 900, easing: 'easeInOutQuart' },
        plugins: { legend: { display: false } },
        scales: { r: {
          min: 0, max: 3,
          ticks: { stepSize: 1, display: false },
          pointLabels: { font: { size: 11, family: "'Manrope', sans-serif" }, color: '#DEEEEE' },
          grid: { color: 'rgba(255,255,255,0.08)' },
          angleLines: { color: 'rgba(255,255,255,0.08)' }
        }}
      }
    });
  }, 400);

  // Bar chart — animate after slight delay
  setTimeout(() => {
    const list = document.getElementById('barList');
    if (!list) return;
    list.innerHTML = sorted.map(q => `
      <div class="bar-row">
        <div class="bar-label">${q.label}</div>
        <div class="bar-track"><div class="bar-fill" id="bar${q.i}"></div></div>
        <div class="bar-score">${q.avg.toFixed(1).replace('.',',')}</div>
      </div>`).join('');
    setTimeout(() => {
      sorted.forEach(q => {
        const el = document.getElementById('bar' + q.i);
        if (el) el.style.width = Math.round((q.avg / 3) * 100) + '%';
      });
    }, 100);
  }, 500);
}

function pct(count, total) {
  return total === 0 ? 0 : Math.round((count / total) * 100);
}
</script>
</body>
</html>
